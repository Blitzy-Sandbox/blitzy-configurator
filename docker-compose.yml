# Local infrastructure for the StrikeForge configurator.
#
# Quick start (Phase A Gate A):
#   docker compose up -d
#   # docker compose v2 emits one JSON object per line (NDJSON), so use `.State`
#   # rather than `.[].State` (which would require a JSON array). Either of the
#   # two equivalent invocations below produces a single "running" line:
#   docker compose ps --format json | jq -r '.State' | sort | uniq
#   docker compose ps --format json | jq -s -r '.[].State' | sort | uniq
#   # expected output: running
#
# All four services (postgres, firebase-auth-emulator, gcs-emulator, backend)
# start with bare `docker compose up -d` per AAP §0.1.2. The backend service
# uses `target: builder` from `backend/Dockerfile` so ts-node-dev can run the
# TypeScript sources from a bind-mounted `./backend` directory without an
# explicit production build cycle. The `backend/src/` and `backend/migrations/`
# directories MUST exist on the host (the builder stage copies both); if you
# need to bring up only the infrastructure services without the backend
# (e.g. running Jest integration tests against the host), pass an explicit
# service list:
#   docker compose up -d postgres firebase-auth-emulator gcs-emulator
#
# All healthchecks bind to 127.0.0.1 (IPv4) because BusyBox `wget` resolves
# `localhost` to ::1 first and Node.js / firebase-tools bind IPv4 by default.

services:
  # PostgreSQL 15 — Cloud SQL target equivalent for local development.
  # Pinned to 15-alpine per AAP §0.4.4. Supplies DATABASE_URL endpoint
  # accessed via TCP 127.0.0.1:5432 (host) or postgres:5432 (compose network).
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: strikeforge
    ports:
      - '5432:5432'
    volumes:
      - strikeforge-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d strikeforge']
      interval: 5s
      timeout: 3s
      retries: 20

  # Firebase Auth Emulator — bundled with the firebase-tools npm package.
  # We install firebase-tools at container start using `--ignore-scripts` to
  # skip transitive native compilation (notably re2) that hangs on alpine due
  # to missing build tools. Auth-only emulator is configured via firebase.json
  # because firebase-tools 15.x removed the --host / --auth-port CLI flags.
  firebase-auth-emulator:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /fb
    command:
      - 'sh'
      - '-c'
      - 'mkdir -p /fb && cd /fb && echo ''{"emulators":{"auth":{"host":"0.0.0.0","port":9099}}}'' > firebase.json && npm install -g firebase-tools --omit=optional --ignore-scripts --no-fund --no-audit --no-progress && firebase emulators:start --only auth --project strikeforge-local'
    ports:
      - '9099:9099'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:9099']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  # fake-gcs-server — emulates Google Cloud Storage with the Storage v1 API.
  # The `-public-host gcs-emulator:4443` flag makes signed URLs reference the
  # compose-network hostname. The `@google-cloud/storage` SDK targets this
  # emulator via the STORAGE_EMULATOR_HOST environment variable.
  gcs-emulator:
    image: fsouza/fake-gcs-server:latest
    restart: unless-stopped
    command:
      - '-scheme'
      - 'http'
      - '-port'
      - '4443'
      - '-public-host'
      - 'gcs-emulator:4443'
    ports:
      - '4443:4443'
    volumes:
      - strikeforge-gcs-data:/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4443/storage/v1/b']
      interval: 10s
      timeout: 5s
      retries: 20

  # Backend Express service — Phase A minimum implementation that satisfies:
  #   * Rule R4 — fail-fast within 2s if any of the six required env vars
  #     is unset (DATABASE_URL, FIREBASE_PROJECT_ID, GCS_BUCKET_NAME,
  #     GCS_EMULATOR_HOST, COVERAGE_THRESHOLD, GCP_REGION).
  #   * Rule R6 — `backend/src/tracing.ts` is the FIRST import in
  #     `backend/src/index.ts`, registering OpenTelemetry auto-instrumentation
  #     before any application module loads.
  #   * AAP §0.1.2 — `docker compose up -d` brings up the backend alongside
  #     postgres, firebase-auth-emulator, and gcs-emulator (4 services).
  #   * AAP §0.5.6 — middleware chain ordering: tracing → express.json →
  #     correlation → request logger → metrics → routes → error handler.
  #   * ST-048 — `/healthz`, `/readyz`, `/metrics` endpoints exposed.
  #
  # The Dockerfile's `builder` stage is targeted so ts-node-dev can run from
  # source. The bind-mount `./backend:/app` enables hot-reload during dev;
  # the anonymous `/app/node_modules` volume preserves the container's
  # node_modules (which were populated by `npm install` during the build).
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    depends_on:
      postgres:
        condition: service_healthy
      firebase-auth-emulator:
        condition: service_healthy
      gcs-emulator:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/strikeforge
      FIREBASE_PROJECT_ID: strikeforge-local
      FIREBASE_AUTH_EMULATOR_HOST: firebase-auth-emulator:9099
      GCS_BUCKET_NAME: strikeforge-logos-local
      GCS_EMULATOR_HOST: http://gcs-emulator:4443
      STORAGE_EMULATOR_HOST: http://gcs-emulator:4443
      COVERAGE_THRESHOLD: '80'
      GCP_REGION: us-central1
      NODE_ENV: development
      PORT: '3000'
      SERVICE_NAME: strikeforge-backend
      SERVICE_VERSION: 0.1.0
      # ── LocalGCP service-account credentials ────────────────────────
      # QA Final E Issue #4 fix — LocalGCP Verification Rule (AAP §0.8.2).
      # The @google-cloud/storage v7 SDK requires an RSA private key to
      # produce v4 signed URLs (Rule R5 / C1). When unset, the SDK falls
      # through to Application Default Credentials (Gaia metadata
      # service), which does not exist inside the Docker network and
      # surfaces as "Invalid form of account ID ...svc.id.goog".
      #
      # `backend/local-dev-sa.json` is a synthetic service-account JSON
      # generated specifically for the LocalGCP environment. The
      # bundled RSA key is used ONLY to compute the signed-URL payload
      # — fake-gcs-server (running as the `gcs-emulator` service) does
      # not validate the signature, so the URL is accepted on read /
      # write. The credential carries no privileges against any real
      # GCP project. Production environments inject Application
      # Default Credentials automatically via Cloud Run service
      # accounts; this file is NEVER deployed.
      GOOGLE_APPLICATION_CREDENTIALS: /app/local-dev-sa.json
      # CORS configuration — QA Issue #10 fix. Comma-separated list of
      # origins permitted to issue cross-origin requests against the
      # backend. The Vite dev server runs on port 5173 by default. In
      # production, set this to the deployed frontend origin (e.g.,
      # https://strikeforge.app). Optional: when unset, the backend
      # falls back to localhost:5173 for developer ergonomics.
      CORS_ALLOWED_ORIGINS: 'http://localhost:5173'
      # Share-link base URL — QA Issue #5 fix. Used by the share-link
      # route to construct fully-qualified URLs returned in the
      # response payload. The frontend writes this URL to the user's
      # clipboard verbatim. In production, set to the deployed
      # frontend origin (e.g., https://strikeforge.app). Optional:
      # when unset, the backend falls back to http://localhost:5173.
      SHARE_BASE_URL: 'http://localhost:5173'
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    command:
      - 'sh'
      - '-c'
      - 'npm install --no-audit --no-fund && npx node-pg-migrate up && npm run dev'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/healthz']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  strikeforge-pg-data:
  strikeforge-gcs-data:
